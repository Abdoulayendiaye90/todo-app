<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App - Abdoulaye Ndiaye</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #e2e8f0;
    }

    .app {
      width: 100%;
      max-width: 550px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      font-size: 1rem;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .add-btn {
      background: #38bdf8;
      color: #0f172a;
    }

    .add-btn:hover {
      background: #7dd3fc;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .task-text {
      flex: 1;
      word-break: break-word;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      padding: 10px 14px;
    }

    .delete-btn:hover {
      background: #f87171;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 15px 0 5px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo App</h1>
    <p class="subtitle">Ajoute, supprime et sauvegarde tes tâches</p>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Entrer une nouvelle tâche" />
      <button class="add-btn" onclick="addTask()">Ajouter</button>
    </div>

    <ul id="taskList"></ul>
    <p id="emptyMessage" class="empty">Aucune tâche pour le moment.</p>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const emptyMessage = document.getElementById('emptyMessage');

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = '';

      if (tasks.length === 0) {
        emptyMessage.style.display = 'block';
        return;
      }

      emptyMessage.style.display = 'none';

      tasks.forEach((task, index) => {
        const li = document.createElement('li');

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task;

        const deleteButton = document.createElement('button');
        deleteButton.className = 'delete-btn';
        deleteButton.textContent = 'Supprimer';
        deleteButton.onclick = function () {
          deleteTask(index);
        };

        li.appendChild(span);
        li.appendChild(deleteButton);
        taskList.appendChild(li);
      });
    }

    function addTask() {
      const task = taskInput.value.trim();

      if (task === '') {
        alert('Veuillez entrer une tâche.');
        return;
      }

      tasks.push(task);
      saveTasks();
      renderTasks();
      taskInput.value = '';
      taskInput.focus();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      renderTasks();
    }

    taskInput.addEventListener('keypress', function (event) {
      if (event.key === 'Enter') {
        addTask();
      }
    });

    renderTasks();
  </script>
</body>
</html>
